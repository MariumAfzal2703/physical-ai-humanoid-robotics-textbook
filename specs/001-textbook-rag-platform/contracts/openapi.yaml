openapi: 3.0.3
info:
  title: Physical AI Textbook Backend API
  version: 0.1.0
  description: API contract for chatbot, health, auth, and chapter transformations.
servers:
  - url: https://api.example.com
paths:
  /health:
    get:
      summary: Service health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /chat:
    post:
      summary: Ask a textbook-grounded question
      operationId: postChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat response with sources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Upstream model/vector service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/signup:
    post:
      summary: Create learner account
      operationId: postSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Account already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/signin:
    post:
      summary: Sign in existing learner
      operationId: postSignin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SigninRequest'
      responses:
        '200':
          description: Signed in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chapters/{chapterId}/personalize:
    post:
      summary: Personalize chapter content to learner profile
      operationId: postPersonalizeChapter
      parameters:
        - in: path
          name: chapterId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                focus:
                  type: string
      responses:
        '200':
          description: Personalized chapter content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterTransformResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chapters/{chapterId}/translate:
    post:
      summary: Translate chapter content to Urdu
      operationId: postTranslateChapter
      parameters:
        - in: path
          name: chapterId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Urdu-translated chapter content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterTransformResponse'
        '404':
          description: Chapter not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ChatRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
        context_text:
          type: string
          nullable: true
        session_id:
          type: string
          format: uuid
          nullable: true

    ChatResponse:
      type: object
      required: [answer, sources]
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: string
        session_id:
          type: string
          format: uuid

    SignupRequest:
      type: object
      required: [email, password, software_background, hardware_background]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        software_background:
          type: string
        hardware_background:
          type: string

    SigninRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user_id, token]
      properties:
        user_id:
          type: string
          format: uuid
        token:
          type: string

    ChapterTransformResponse:
      type: object
      required: [chapter_id, content]
      properties:
        chapter_id:
          type: string
        content:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        detail:
          type: string
          nullable: true
